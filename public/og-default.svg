      <stop offset="0%" stop-color="#08101c" />
      <stop offset="100%" stop-color="#13243a" />
    </linearGradient>
    <radialGradient id="glowCopper" cx="22%" cy="18%" r="72%">
      <stop offset="0%" stop-color="#c26f4a" stop-opacity="0.55" />
      <stop offset="60%" stop-color="#c26f4a" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#c26f4a" stop-opacity="0" />
